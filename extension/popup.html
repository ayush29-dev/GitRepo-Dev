<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitRepo-Dev</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      width: 280px;
      background: #fff;
      color: #111;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .logo {
      width: 28px; height: 28px;
      background: #185FA5;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 14px;
    }
    .logo-text { font-weight: 600; }
    .logo-sub  { font-size: 10px; color: #9ca3af; }
    .body { padding: 12px 16px; }
    .status {
      display: flex; align-items: center; gap-6px;
      font-size: 12px; color: #6b7280;
      margin-bottom: 12px;
      padding: 8px 10px;
      background: #f9fafb;
      border-radius: 8px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
    .dot.green  { background: #22c55e; }
    .dot.gray   { background: #9ca3af; }
    .btn {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary { background: #185FA5; color: white; }
    .btn-primary:hover { background: #0C447C; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f0f0f0;
      font-size: 11px;
      color: #9ca3af;
      display: flex; justify-content: space-between;
    }
    a { color: #185FA5; text-decoration: none; }
    #repo-name { font-weight: 600; color: #111; }
    #not-repo { color: #9ca3af; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div>
      <div class="logo-text">GitRepo-Dev</div>
      <div class="logo-sub">AI Developer Workspace</div>
    </div>
  </div>

  <div class="body">
    <div class="status">
      <span class="dot" id="status-dot" style="background:#9ca3af"></span>
      <span id="status-text">Checking page…</span>
    </div>

    <div id="repo-section" style="display:none">
      <p style="font-size:11px;color:#6b7280;margin-bottom:8px">Current repo</p>
      <p id="repo-name" style="margin-bottom:12px"></p>
      <button class="btn btn-primary" id="btn-toggle">Open Sidebar</button>
      <button class="btn btn-secondary" id="btn-dashboard">Open Dashboard ↗</button>
    </div>

    <div id="not-repo-section">
      <p id="not-repo">Navigate to a GitHub repo to use GitRepo-Dev.</p>
    </div>
  </div>

  <div class="footer">
    <span>v1.0.0</span>
    <a href="http://localhost:5173" target="_blank">Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
