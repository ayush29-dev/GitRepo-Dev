name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    name: Backend lint + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check imports compile
        run: |
          cd backend
          python -c "import main; print('✅ main.py imports OK')"
        env:
          GROQ_API_KEY:          dummy
          GITHUB_TOKEN:          dummy
          DB_HOST:               localhost
          DB_PORT:               3306
          DB_NAME:               gitrepo_dev
          DB_USER:               root
          DB_PASS:               dummy
          AWS_ACCESS_KEY_ID:     dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_REGION:            ap-south-1
          S3_BUCKET:             dummy
          CORS_ORIGINS:          http://localhost:5173

  # ── Extension sidebar ─────────────────────────────────────────────────────────
  extension:
    name: Extension sidebar build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build sidebar
        run: |
          cd extension/sidebar
          npm ci
          npm run build
